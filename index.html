<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Segurança Social | Autenticação Digital</title>
    <style>
        :root { --ss-yellow: #FDC82F; --ss-blue: #003366; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        header { background-color: var(--ss-yellow); color: #000; padding: 25px; font-weight: bold; font-size: 1.5em; text-align: center; border-bottom: 12px solid var(--ss-blue); }
        .container { max-width: 500px; margin: 40px auto; padding: 30px; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 1.4em; color: var(--ss-blue); margin-bottom: 20px; text-transform: uppercase; border-bottom: 3px solid var(--ss-yellow); display: inline-block; padding-bottom: 5px; }
        p { font-size: 14px; color: #666; line-height: 1.5; }
        input { width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1.1em; text-align: center; font-weight: bold; margin: 20px 0; outline-color: var(--ss-blue); }
        .btn-ss { width: 100%; padding: 18px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 16px; transition: 0.3s; display: block; text-decoration: none; }
        .btn-validate { background-color: var(--ss-yellow); color: #000; }
        .btn-validate:hover { background-color: #e5b52a; }
        .btn-download { background-color: #c00; color: white; margin-top: 20px; }
        .btn-reset { background: none; color: var(--ss-blue); text-decoration: underline; margin-top: 15px; border: none; cursor: pointer; }
        #resultArea, #errorArea { display: none; }
        .success-box { background: #d4edda; color: #155724; padding: 15px; border-radius: 4px; font-weight: bold; margin-bottom: 20px; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<header>SEGURANÇA SOCIAL</header>

<div class="container">
    <div id="searchArea">
        <h1>Autenticação</h1>
        <p>Introduza o código de verificação para validar a autenticidade do documento.</p>
        <input type="text" id="codigo" placeholder="Ex: 14-3kwp-1n8j-mds6-2" autocomplete="off">
        <button type="button" class="btn-ss btn-validate" onclick="validate()">Validar Documento</button>
        <p id="errorArea" style="color: #c00; margin-top: 20px; font-weight: bold; display: none;">O código introduzido é inválido ou não existe.</p>
    </div>

    <div id="resultArea">
        <div class="success-box">✓ DOCUMENTO AUTÊNTICO</div>
        <div style="text-align: left; background: #f9f9f9; padding: 15px; border: 1px solid #eee; border-radius: 4px;">
            <p style="margin: 5px 0;"><strong>Código:</strong> <span id="res-code"></span></p>
            <p style="margin: 5px 0;"><strong>Status:</strong> Verificado com sucesso</p>
        </div>
        <a href="#" id="pdfLink" class="btn-ss btn-download" target="_blank">ABRIR PDF ORIGINAL</a>
        <button class="btn-reset" onclick="window.location.reload()">Validar outro código</button>
    </div>
</div>

<script>
    // Lista oficial de códigos permitidos
    const permitidos = [
        "9-3jqc-2vwm-kgp7-8", "10-6ndr-9vfs-zlq3-1", "11-8kpt-4m2z-xhw9-5", "12-2jqr-7vfs-kgp1-4",
        "13-5mfs-9rdx-btv8-0", "14-3kwp-1n8j-mds6-2", "15-9hly-6xbt-zqc4-7", "16-1vtw-4nbm-lhy2-9",
        "17-4zrn-8kgp-kgp5-3", "21-5jqr-4m2z-zqc6-4"
    ];

    function validate() {
        const inputElement = document.getElementById('codigo');
        const errorMsg = document.getElementById('errorArea');
        const codeInput = inputElement.value.trim().toLowerCase();

        if (permitidos.includes(codeInput)) {
            // Esconde busca e mostra resultado
            document.getElementById('searchArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('res-code').innerText = codeInput;
            
            // Define o link do PDF com Cache Buster para evitar erros antigos
            const timestamp = new Date().getTime();
            document.getElementById('pdfLink').href = codeInput + ".pdf?v=" + timestamp;
        } else {
            // Mostra erro
            errorMsg.style.display = 'block';
            inputElement.style.borderColor = '#c00';
        }
    }
</script>

</body>
</html>
