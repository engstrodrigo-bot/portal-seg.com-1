<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Segurança Social | Autenticação Digital</title>
    <style>
        :root { --ss-yellow: #FDC82F; --ss-blue: #003366; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        header { background-color: var(--ss-yellow); color: #000; padding: 25px; font-weight: bold; font-size: 1.5em; text-align: center; border-bottom: 12px solid var(--ss-blue); }
        .container { max-width: 500px; margin: 40px auto; padding: 30px; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 1.4em; color: var(--ss-blue); text-transform: uppercase; margin-bottom: 20px; }
        input { width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1.1em; text-align: center; font-weight: bold; margin-bottom: 20px; }
        .btn-ss { width: 100%; padding: 18px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 16px; display: block; text-decoration: none; }
        .btn-validate { background-color: var(--ss-yellow); color: #000; }
        .btn-download { background-color: #c00; color: white; margin-top: 20px; }
        #resultArea, #errorArea { display: none; }
        .success-box { background: #d4edda; color: #155724; padding: 15px; border-radius: 4px; font-weight: bold; margin-bottom: 20px; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<header>SEGURANÇA SOCIAL</header>

<div class="container">
    <div id="searchArea">
        <h1>Autenticação</h1>
        <p>Introduza o código de verificação para validar o documento.</p>
        <input type="text" id="codigo" placeholder="Digite o código aqui" autocomplete="off">
        <button type="button" class="btn-ss btn-validate" onclick="validate()">Validar Documento</button>
        <p id="errorArea" style="color: #c00; margin-top: 20px; font-weight: bold;">Código inválido ou arquivo não encontrado.</p>
    </div>

    <div id="resultArea">
        <div class="success-box">✓ DOCUMENTO AUTÊNTICO</div>
        <p><strong>Código:</strong> <span id="res-code"></span></p>
        <a href="#" id="pdfLink" class="btn-ss btn-download" target="_blank">ABRIR PDF ORIGINAL</a>
        <button onclick="window.location.reload()" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline; margin-top:20px;">Validar outro código</button>
    </div>
</div>

<script>
    // Lista de códigos baseada nos ficheiros que enviou
    const permitidos = [
        "3-5mfs-9rdx-btv8-0", "9-3jqc-2vwm-kgp7-8", "10-6ndr-9vfs-zlq3-1",
        "11-8kpt-4m2z-xhw9-5", "12-2jqr-7vfs-kgp1-4", "13-5mfs-9rdx-btv8-0",
        "14-3kwp-1n8j-mds6-2", "15-9hly-6xbt-zqc4-7", "16-1vtw-4nbm-lhy2-9",
        "17-4zrn-8kgp-kgp5-3"
    ];

    async function checkFile(url) {
        try {
            const response = await fetch(url, { method: 'HEAD' });
            return response.ok;
        } catch (e) { return false; }
    }

    async function validate() {
        const input = document.getElementById('codigo').value.trim().toLowerCase();
        const errorArea = document.getElementById('errorArea');
        
        if (!permitidos.includes(input)) {
            errorArea.style.display = 'block';
            return;
        }

        // Tenta encontrar o arquivo com .pdf ou .pdf.pdf (caso tenha salvado errado)
        let finalUrl = input + ".pdf";
        const isNormal = await checkFile(finalUrl);
        
        if (!isNormal) {
            const isDouble = await checkFile(input + ".pdf.pdf");
            if (isDouble) finalUrl = input + ".pdf.pdf";
        }

        document.getElementById('searchArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('res-code').innerText = input;
        
        // Adiciona timestamp para forçar o navegador a ignorar erros antigos (Cache Buster)
        document.getElementById('pdfLink').href = finalUrl + "?v=" + new Date().getTime();
    }
</script>
</body>
</html>
